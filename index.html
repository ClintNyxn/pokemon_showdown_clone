<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="battle_area">
      <div class="boxes">
        <img class="user_curr_pokemon_img pokemon" src="" alt=""/>
      </div>

      <div class="boxes">
        <img class="oppo_curr_pokemon_img pokemon" src="" alt=""/>
      </div>
    </div>

    <div class="move_array">
      <button class="move 0">
        <div class="atk_type 0"></div>
        <div class="move_name 0"></div>
      </button>
      <button class="move 1">
        <div class="atk_type 1"></div>
        <div class="move_name 1"></div>
      </button>
      <button class="move 2">
        <div class="atk_type 2"></div>
        <div class="move_name 2"></div>
      </button>
      <button class="move 3">
        <div class="atk_type 3"></div>
        <div class="move_name 3"></div>
      </button>
    </div>

    <div class="pokemon_array">
      <img src="" alt="" class="0 array_pokemon pokemon" />
      <img src="" alt="" class="1 array_pokemon pokemon" />
      <img src="" alt="" class="2 array_pokemon pokemon" />
      <img src="" alt="" class="3 array_pokemon pokemon" />
      <img src="" alt="" class="4 array_pokemon pokemon" />
      <img src="" alt="" class="5 array_pokemon pokemon" />
    </div>

    <div class="stat_box">
      <p class="show_hp" style="width: 100%; background-color: lightgreen"></p>
      <span class="show_name" style="font-size: large; font-weight: 600"></span>
      <br />
      <span class="show_type1" style="color: white; padding: 2px;"></span>
      <span class="show_type2" style="color: white; padding: 2px; "></span>
      <br />
      <span class="show_atk"></span>
      <br />
      <span class="show_def"></span>
      <br />
      <span class="show_satk"></span>
      <br />
      <span class="show_sdef"></span>
      <br />
      <span class="show_speed"></span>
    </div>

    <script src="script.js"></script>
  </body>
</html>
