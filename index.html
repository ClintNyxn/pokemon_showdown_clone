<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Showdown Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="battle_arena" style="font-weight: 100%; height: 70vh;">
        <div class="user_pokemon"">
            <img class="user_current_pokemon pokemon" src="" alt="user pokemon">
            <div class="stat_show">
                  
            </div>
        </div>
        <div class="user_pokemon_balls" ></div>

        <div class="oppo_pokemon" style="background-color: cornflowerblue;">
            <img class="oppo_current_pokemon pokemon" src="" alt="opponent pokemon">
        </div>
        <div class="oppo_pokemon_balls" style="background-color: cadetblue;"></div>
    </div>
    <div class="user_moves"  style="font-weight: 100%; height: 15vh;">
        <div class="first_move"></div>
        <div class="second_move"></div>
        <div class="third_move"></div>
        <div class="fourth_move"></div>
    </div>
    <div class="user_pokemons"  style="font-weight: 100%; height: 15vh;">
        <div>
            <img src="" alt="" class="userpoke 0 pokemon">
        </div>
        <div>
            <img src="" alt="" class="userpoke 1 pokemon">
        </div>
        <div>
            <img src="" alt="" class="userpoke 2 pokemon">
        </div>
        <div>
            <img src="" alt="" class="userpoke 3 pokemon">
        </div>
        <div>
            <img src="" alt="" class="userpoke 4 pokemon">
        </div>
        <div>
            <img src="" alt="" class="userpoke 5 pokemon">
        </div>
    </div>
    
    <script src="script.js"></script>
    <!-- <script src="script.js"></script> -->
</body>
</html>
