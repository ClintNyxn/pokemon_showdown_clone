<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Showdown Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="battle_arena" style="font-weight: 100%; height: 70vh; background-color: lightgreen;">
        <div class="user_pokemon"></div>
        <div class="user_pokemon_balls"></div>

        <div class="oppo_pokemon"></div>
        <div class="oppo_pokemon_balls"></div>
    </div>
    <div class="user_moves"  style="font-weight: 100%; height: 15vh;">
        <div class="first_move"></div>
        <div class="second_move"></div>
        <div class="third_move"></div>
        <div class="fourth_move"></div>
    </div>
    <div class="user_pokemons"  style="font-weight: 100%; height: 15vh;">
        <div class="first_pokemon"></div>
        <div class="second_pokemon"></div>
        <div class="third_pokemon"></div>
        <div class="fourth_pokemon"></div>
        <div class="fifth_pokemon"></div>
        <div class="sixth_pokemon"></div>
    </div>
</body>
</html>
